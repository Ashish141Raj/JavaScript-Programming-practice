<!-- 1. Dark Mode / Light Mode Toggle 🌙

👉 Create:
- A heading
- A button

👉 When button is clicked:
- Background color should change
- Text color should change

Hint:
- Use classList.toggle()
- Use style.backgroundColor

---------------------------------------------------->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoM</title>
    <style>
        body{
            background-color: white;
            color: black;
            text-align: center;
            margin-top: 100px;
            transition: 0.3s;
        }
        .dark{
            background-color: black;
            color: white;
        }
        button{
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <h1>Hello EveryOne it's Ashish from Your heart.</h1>
    <button>Click me!</button>
</body>
</html>
